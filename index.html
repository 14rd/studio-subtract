            var mx2 = mouseRef.current.x, my2 = mouseRef.current.y;
            var tiltScale = mobile ? 0.6 : 1;
            wrapperRef.current.style.transform = "translate3d(" + ((mx2-0.5)*28*tiltScale) + "px," + ((my2-0.5)*18*tiltScale) + "px,0) rotateX(" + (-(my2-0.5)*8*tiltScale) + "deg) rotateY(" + ((mx2-0.5)*12*tiltScale) + "deg)";
          }

          var center = Math.round(progress);
          var half = Math.floor(MAX_VISIBLE / 2);
          var visArr = [];
          for (var vi = -half; vi <= half; vi++) {
            visArr.push(((center + vi) % n + n) % n);
          }
          var visKey = visArr.join(",");
          if (visKey !== lastVisibleKey.current) {
            lastVisibleKey.current = visKey;
            setVisible(visArr);
          }

          var activeIdx = ((center % n) + n) % n;
          var fade = fadeRef.current;
          for (var si = 0; si < slotRefs.current.length; si++) {
            var el = slotRefs.current[si]; if (!el) continue;
            var idx = parseInt(el.dataset.idx, 10);
            var o = idx - progress;
            while (o > n / 2) o -= n;
            while (o < -n / 2) o += n;
            var sc = cardScale(items[idx].r || 1.5);
            el.style.transform = "translate3d(calc(-50% + " + (o*spreadX) + "px),calc(-50% + " + (((((idx%n)+n)%n)*53)%130-65+o*6) + "px)," + (-Math.abs(o)*(mobile?150:220)) + "px) rotate(" + (Math.sin(idx*1.3)*3.2) + "deg) scale(" + (sc * (0.92 + 0.08 * fade)) + ")";
            var absO = Math.abs(o);
            var cardOpacity = absO > 5 ? 0 : absO > 3 ? 1 - (absO - 3) / 2 : 1;
            el.style.opacity = String(cardOpacity * fade);
            el.style.zIndex = 1000 - Math.abs(Math.round(o*10));
          }

          if (activeIdx !== lastBannerIdx.current) {
            lastBannerIdx.current = activeIdx;
            var item = items[activeIdx];
            bannerTextRef.current = cardLabel(item);
            if (bannerTitleRef.current) {
              bannerTitleRef.current.textContent = bannerTextRef.current;
              bannerTitleRef.current.style.animation = "none"; bannerTitleRef.current.offsetHeight;
              bannerTitleRef.current.style.animation = "rise 0.55s cubic-bezier(.2,.7,.2,1)";
            }
          }
          rafRef.current = requestAnimationFrame(tick);
        };
        rafRef.current = requestAnimationFrame(tick);
        return function() { cancelAnimationFrame(rafRef.current); };
      }, [n, mobile, spreadX, items, ready]);

      useEffect(function() {
        var el = stageRef.current; if (!el) return;
        var onWheel = function(e) { e.preventDefault(); targetRef.current += (e.deltaY+e.deltaX)*0.0025; };
        el.addEventListener("wheel", onWheel, { passive: false });
        return function() { el.removeEventListener("wheel", onWheel); };
      }, [n]);

      useEffect(function() {
        var onKey = function(e) {
          if (e.key === "ArrowRight" || e.key === "ArrowDown") targetRef.current = Math.round(targetRef.current)+1;
          else if (e.key === "ArrowLeft" || e.key === "ArrowUp") targetRef.current = Math.round(targetRef.current)-1;
        };
        window.addEventListener("keydown", onKey);
        return function() { window.removeEventListener("keydown", onKey); };
      }, [n]);

      useEffect(function() {
        var el = stageRef.current; if (!el) return;
        var startX = 0, startProg = 0, dragging = false, lastX = 0, lastT = 0;
        var onDown = function(e) { dragging = true; velocityRef.current = 0;
          var cx = e.clientX != null ? e.clientX : (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
          startX = cx; lastX = cx; lastT = performance.now(); startProg = targetRef.current; };
        var onMove = function(e) { if (!dragging) return;
          var cx = e.clientX != null ? e.clientX : (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
          targetRef.current = startProg + (startX-cx)*(mobile ? 0.009 : 0.012); lastX = cx; lastT = performance.now(); };
        var onUp = function(e) { if (!dragging) return; dragging = false;
          var cx = e.clientX != null ? e.clientX : (e.changedTouches && e.changedTouches[0] ? e.changedTouches[0].clientX : lastX);
          var dt = performance.now() - lastT;
          if (dt > 0 && dt < 100) velocityRef.current = (lastX - cx) / dt * (mobile ? 0.25 : 0.3); };
        el.addEventListener("mousedown", onDown); window.addEventListener("mousemove", onMove); window.addEventListener("mouseup", onUp);
        el.addEventListener("touchstart", onDown, { passive: true }); window.addEventListener("touchmove", onMove, { passive: true }); window.addEventListener("touchend", onUp, { passive: true });
        return function() { el.removeEventListener("mousedown", onDown); window.removeEventListener("mousemove", onMove); window.removeEventListener("mouseup", onUp);
          el.removeEventListener("touchstart", onDown); window.removeEventListener("touchmove", onMove); window.removeEventListener("touchend", onUp); };
      }, [n, mobile]);

      useEffect(function() {
        var onMove = function(e) { mouseRef.current = { x: e.clientX / window.innerWidth, y: e.clientY / window.innerHeight }; };
        window.addEventListener("mousemove", onMove);
        return function() { window.removeEventListener("mousemove", onMove); };
      }, []);

      useEffect(function() {
        if (!mobile) return;
        var gyroActive = false;
        var onOrientation = function(e) {
          var gamma = e.gamma || 0;
          var beta = e.beta || 0;
          mouseRef.current = {
            x: Math.max(0, Math.min(1, 0.5 + gamma / 60)),
            y: Math.max(0, Math.min(1, 0.5 + (beta - 45) / 60))
          };
        };
        var requestGyro = function() {
          if (gyroActive) return;
          if (typeof DeviceOrientationEvent !== "undefined" && typeof DeviceOrientationEvent.requestPermission === "function") {
            DeviceOrientationEvent.requestPermission().then(function(state) {
              if (state === "granted") { gyroActive = true; window.addEventListener("deviceorientation", onOrientation); }
            });
          } else {
            gyroActive = true;
            window.addEventListener("deviceorientation", onOrientation);
          }
        };
        var el = stageRef.current;
        if (el) el.addEventListener("touchstart", requestGyro, { once: true });
        return function() {
          if (el) el.removeEventListener("touchstart", requestGyro);
          window.removeEventListener("deviceorientation", onOrientation);
        };
      }, [mobile]);

      slotRefs.current = [];

      return (
        <div ref={stageRef} style={{ position: "fixed", inset: 0, background: "var(--bg)",
          perspective: mobile ? "1200px" : "1800px", perspectiveOrigin: "50% 50%",
          overflow: "hidden", userSelect: "none", touchAction: "none" }}>
          <div ref={wrapperRef} style={{ position: "absolute", inset: 0,
            WebkitTransformStyle: "preserve-3d", transformStyle: "preserve-3d",
            transition: mobile ? "none" : "transform 0.5s cubic-bezier(.2,.7,.2,1)", pointerEvents: "none" }}>
            {visible.map(function(idx) {
              var item = items[idx];
              var r = item.r || 1.5;
              var itemH = Math.round(cardW / r);
              return (
                <div key={idx} data-idx={idx} ref={function(el) { if (el) slotRefs.current.push(el); }} className="gallery-card"
                  style={{ position: "absolute", left: "50%", top: "50%", width: cardW, height: itemH,
                    borderRadius: 20, overflow: "hidden",
                    boxShadow: "0 4px 24px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.04)",
                    pointerEvents: "none", zIndex: 1000, opacity: 0 }}>
                  {item.type === "video" ? (
                    <video src={item.src} poster={item.src.replace(/\.mp4$/, "_poster.jpg")} autoPlay muted loop playsInline
                      onContextMenu={function(e) { e.preventDefault(); }}
                      controlsList="nodownload" disablePictureInPicture style={{
                      width: "100%", height: "100%", objectFit: "cover",
                      background: "var(--bg) url(" + item.src.replace(/\.mp4$/, "_poster.jpg") + ") center/cover no-repeat",
                      transform: "translateZ(0)", WebkitBackfaceVisibility: "hidden" }} />
                  ) : (
                    <img src={item.src} alt={item.label || ""} draggable="false" loading="lazy"
                      onContextMenu={function(e) { e.preventDefault(); }}
                      style={{
                      width: "100%", height: "100%", objectFit: "cover",
                      transform: "translateZ(0)", userSelect: "none", WebkitUserDrag: "none", WebkitBackfaceVisibility: "hidden" }} />
                  )}
                </div>
              );
            })}
          </div>
          <div style={{ position: "absolute", left: 0, right: 0, bottom: mobile ? 48 : 64,
            textAlign: "center",
            pointerEvents: "none", padding: "0 16px", zIndex: 11 }}>
            <h1 ref={bannerTitleRef} style={{ fontWeight: 400,
              fontSize: mobile ? 14 : 16, lineHeight: 1.55, letterSpacing: "-0.01em",
              margin: 0, color: "var(--fg)",
              animation: "rise 0.55s cubic-bezier(.2,.7,.2,1)" }}>{bannerTextRef.current}</h1>
          </div>
        </div>
      );
    }

    /* ===================== PROJECT DETAIL ===================== */
    function ProjectDetail({ project, allProjects, onBack, onNext, onNav }) {
      var stM = useState(false); var mounted = stM[0], setMounted = stM[1];
      var mobile = isMobile();
      useEffect(function() { var t = setTimeout(function() { setMounted(true); }, 30); return function() { clearTimeout(t); }; }, []);
      var nextIdx = (allProjects.findIndex(function(p) { return p.id === project.id; }) + 1) % allProjects.length;
      var next = allProjects[nextIdx];
      var hasImgHero = project.content && project.content.length > 0 && project.content[0].type === "img";
      var heroSrc = hasImgHero ? project.content[0].src : project.cover;
      var contentItems = project.content ? (hasImgHero ? project.content.slice(1) : project.content) : [];

      return (
        <SmoothScroll scrollKey={project.id}>
          <div style={{ position: "relative" }}>
            <div style={{ position: "fixed", top: 0, left: 0, right: 0, height: mobile ? 100 : 140, zIndex: 40,
              pointerEvents: "none",
              background: "linear-gradient(180deg, rgba(255,255,255,1) 0%, rgba(255,255,255,0.85) 40%, rgba(255,255,255,0) 100%)",
              WebkitBackdropFilter: "blur(12px)", backdropFilter: "blur(12px)",

              maskImage: "linear-gradient(180deg, black 0%, black 30%, transparent 100%)" }} />
            <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, height: mobile ? 80 : 120, zIndex: 40,
              pointerEvents: "none",
              background: "linear-gradient(0deg, rgba(255,255,255,1) 0%, rgba(255,255,255,0.85) 40%, rgba(255,255,255,0) 100%)",
              WebkitBackdropFilter: "blur(12px)", backdropFilter: "blur(12px)",
              WebkitMaskImage: "linear-gradient(0deg, black 0%, black 30%, transparent 100%)",
              maskImage: "linear-gradient(0deg, black 0%, black 30%, transparent 100%)" }} />

            <div style={{ opacity: mounted ? 1 : 0, transition: "opacity 0.5s", animation: "slideIn 0.6s cubic-bezier(.2,.7,.2,1)" }}>
              <section style={{ position: "relative", width: "100%", overflow: "hidden",
                padding: mobile ? "80px 20px 40px" : "100px 32px 60px" }}>
                {heroSrc.endsWith(".mp4") ? (
                  <video src={heroSrc} autoPlay muted loop playsInline style={{
                    width: "100%", maxWidth: 1200, display: "block", margin: "0 auto", objectFit: "contain",
                    aspectRatio: "16/10", background: "var(--line)" }} />
                ) : (
                  <img src={heroSrc} alt={project.title} style={{
                    width: "100%", maxWidth: 1200, display: "block", margin: "0 auto", objectFit: "contain",
                    aspectRatio: "16/10", background: "var(--line)",
                    transform: mounted ? "scale(1) translateZ(0)" : "scale(1.02) translateZ(0)",
                    transition: "transform 1.2s cubic-bezier(.2,.7,.2,1)", WebkitBackfaceVisibility: "hidden" }} />
                )}
              </section>

              <section style={{ maxWidth: 640, margin: "0 auto", padding: mobile ? "32px 20px" : "48px 32px", textAlign: "center" }}>
                <h1 style={{ fontWeight: 400, fontSize: mobile ? 14 : 16,
                  lineHeight: 1.55, letterSpacing: "-0.01em", margin: "0 0 20px", color: "var(--fg)" }}>{project.displayTitle || project.title}</h1>
                <div style={{ fontSize: 11, fontWeight: 400, lineHeight: 1.6, letterSpacing: "-0.01em",
                  color: "var(--fg-dim)", margin: "0 0 24px" }}>
                  {project.client} — {project.year}<br/>{project.role}
                </div>
                <p style={{ fontWeight: 400, fontSize: mobile ? 13 : 14, lineHeight: 1.6, letterSpacing: "-0.01em",
                  color: "var(--fg)", margin: 0 }}>{project.blurb}</p>
              </section>

              {contentItems.length > 0 && (
                <section style={{ padding: mobile ? "20px 20px 80px" : "40px 32px 120px", maxWidth: 1200, margin: "0 auto" }}>
                  <div style={{ display: "flex", flexDirection: "column", gap: mobile ? 40 : 64 }}>

                        <img key={idx} src={item.src} alt={project.title + " " + (idx + 2)} loading="lazy" style={{
                          width: "100%", display: "block", objectFit: "contain", aspectRatio: "16/10", background: "var(--line)" }} />
                      );
                    })}
                  </div>
                </section>
              )}

              <section onClick={function() { onNext(next); }} style={{
                position: "relative", height: mobile ? "50vh" : "70vh", cursor: "pointer", overflow: "hidden",
                borderTop: "1px solid var(--line)" }}>
                <div style={{ position: "absolute", inset: 0, background: coverBg(next), filter: "brightness(0.85)" }}/>
                <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", textAlign: "center", color: "#fff" }}>
                  <div>
                    <div style={{ fontSize: 11, fontWeight: 400, letterSpacing: "-0.01em", opacity: 0.85,
                      marginBottom: mobile ? 12 : 20, textShadow: "0 1px 12px rgba(0,0,0,0.3)" }}>Next</div>
                    <div style={{ fontWeight: 400, fontSize: mobile ? 14 : 16,
                      lineHeight: 1.55, letterSpacing: "-0.01em", textShadow: "0 2px 40px rgba(0,0,0,0.25)" }}>{next.displayTitle || next.title}</div>
                  </div>

              </section>
            </div>
          </div>
        </SmoothScroll>
      );

    /* ===================== NAV ===================== */
    function Nav({ onNav, page }) {
      var mobile = isMobile();
      return (
        <nav style={{ position: "fixed", top: 0, left: 0, right: 0, zIndex: 50,
          padding: mobile ? "20px 16px" : "24px 32px",
          display: "flex", alignItems: "center", justifyContent: "center",
          pointerEvents: "none", userSelect: "none", WebkitUserSelect: "none",
          background: "linear-gradient(180deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0) 100%)",
          backdropFilter: "blur(15px)", WebkitBackdropFilter: "blur(15px)",
          WebkitMaskImage: "linear-gradient(180deg, black 0%, black 40%, transparent 100%)",
          maskImage: "linear-gradient(180deg, black 0%, black 40%, transparent 100%)" }}>
          <div style={{ display: "flex", alignItems: "center", gap: mobile ? 16 : 24, pointerEvents: "auto",
            fontSize: mobile ? 11 : 12, fontWeight: 500, color: "var(--fg)", letterSpacing: "-0.01em" }}>
            <NavLink active={page === "works"} label="Work" onClick={function() { onNav("works"); }} />
            <NavLink active={page === "studio"} label="Studio" onClick={function() { onNav("studio"); }} />
            <NavLink active={page === "contact"} label="Contact" onClick={function() { onNav("contact"); }} />
          </div>

    function NavLink({ label, href, active, onClick }) {
      var st = useState(false); var hover = st[0], setHover = st[1];
      return (
        <a href={href || ("/" + label.toLowerCase())} onClick={function(e) { e.preventDefault(); onClick && onClick(); }}
          onMouseEnter={function() { setHover(true); }} onMouseLeave={function() { setHover(false); }}
          style={{ color: active || hover ? "var(--fg)" : "var(--fg-dim)", textDecoration: active ? "underline" : "none",
            textUnderlineOffset: "4px", transition: "color 0.2s" }}>{label}</a>

    /* ===================== STUDIO PAGE ===================== */
    function StudioPage() {
      var mobile = isMobile();
      return (
        <div style={{ position: "fixed", inset: 0, background: "var(--bg)", zIndex: 5,
          display: "flex", alignItems: "center", justifyContent: "center",
          animation: "slideIn 0.6s cubic-bezier(.2,.7,.2,1)" }}>
          <div style={{ maxWidth: 560, width: "100%", padding: mobile ? "0 20px" : "0 40px", textAlign: "center" }}>
            <p style={{ fontSize: mobile ? 14 : 16, fontWeight: 400, lineHeight: 1.55, letterSpacing: "-0.01em",
              color: "var(--fg)", margin: 0 }}>
              Studio Subtract.
            </p>
            <p style={{ fontSize: mobile ? 14 : 16, fontWeight: 400, lineHeight: 1.55, letterSpacing: "-0.01em",
              color: "var(--fg)", margin: "1.2em 0 0" }}>

            </p>
            <p style={{ fontSize: mobile ? 14 : 16, fontWeight: 400, lineHeight: 1.55, letterSpacing: "-0.01em",
              color: "var(--fg-dim)", margin: "1.2em 0 0" }}>
              Founded by James Jefferys.
            </p>

        </div>

    /* ===================== CONTACT PAGE ===================== */
    function ContactPage() {
      var mobile = isMobile();
      return (
        <div style={{ position: "fixed", inset: 0, background: "var(--bg)", zIndex: 5,
          display: "flex", alignItems: "center", justifyContent: "center",
          animation: "slideIn 0.6s cubic-bezier(.2,.7,.2,1)" }}>
          <div style={{ maxWidth: 560, width: "100%", padding: mobile ? "0 20px" : "0 40px", textAlign: "center" }}>
            <a href="mailto:inbox@studiosubtract.com" style={{
              fontSize: mobile ? 14 : 16, fontWeight: 400, lineHeight: 1.55, letterSpacing: "-0.01em",
              color: "var(--fg)", textDecoration: "underline", textUnderlineOffset: "3px",
              textDecorationColor: "var(--line)", transition: "text-decoration-color 0.2s"
            }} onMouseEnter={function(e) { e.currentTarget.style.textDecorationColor = "var(--fg)"; }}
               onMouseLeave={function(e) { e.currentTarget.style.textDecorationColor = "var(--line)"; }}>inbox@studiosubtract.com</a>
          </div>

    /* ===================== INTRO OVERLAY ===================== */
    function IntroOverlay({ onDone }) {
      var stH = useState(false); var hidden = stH[0], setHidden = stH[1];
      var stLoaded = useState(false); var loaded = stLoaded[0], setLoaded = stLoaded[1];
      var stProgress = useState(0); var progress = stProgress[0], setProgress = stProgress[1];
      var smoothProgress = useRef(0);
      var barRef = useRef(null);
      var circleRef = useRef(null);
      var rafRef = useRef(null);

      useEffect(function() {
        var items = window.GALLERY_ITEMS || [];
        var srcs = items.filter(function(it) { return it.type === "img"; }).map(function(it) { return it.src; });
        var posterSrcs = items.filter(function(it) { return it.type === "video"; }).map(function(it) { return it.src.replace(/\.mp4$/, "_poster.jpg"); });
        var allSrcs = srcs.concat(posterSrcs);
        var total = Math.max(allSrcs.length, 1);
        var count = 0;
        allSrcs.forEach(function(src) {
          var img = new Image();
          img.onload = img.onerror = function() {
            count++;
            setProgress(count / total);
            if (count >= total) setLoaded(true);
          };
          img.src = src;
        });
        if (allSrcs.length === 0) { setLoaded(true); setProgress(1); }
        var fallback = setTimeout(function() { setLoaded(true); setProgress(1); }, 8000);
        return function() { clearTimeout(fallback); };
      }, []);

      useEffect(function() {
        var tick = function() {
          smoothProgress.current += (progress - smoothProgress.current) * 0.06;
          if (Math.abs(progress - smoothProgress.current) < 0.001) smoothProgress.current = progress;
          if (barRef.current) barRef.current.style.transform = "scaleX(" + smoothProgress.current + ")";
          rafRef.current = requestAnimationFrame(tick);
        };
        rafRef.current = requestAnimationFrame(tick);
        return function() { cancelAnimationFrame(rafRef.current); };
      }, [progress]);

      useEffect(function() {
        if (!loaded) return;
        var t1 = setTimeout(function() { setHidden(true); }, 600);
        var t2 = setTimeout(function() { onDone && onDone(); }, 1800);
        return function() { clearTimeout(t1); clearTimeout(t2); };
      }, [loaded]);

      return (
        <div style={{ position: "fixed", inset: 0, zIndex: 100, background: "var(--bg)",
          display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
          transition: "opacity 1.2s cubic-bezier(.4,0,.2,1)",
          opacity: hidden ? 0 : 1,
          pointerEvents: hidden ? "none" : "auto" }}>
          <div style={{ position: "relative", width: 48, height: 48, marginBottom: 32 }}>
            <svg width="48" height="48" viewBox="0 0 48 48" style={{ position: "absolute", inset: 0 }}>
              <circle cx="24" cy="24" r="20" fill="none" stroke="var(--line)" strokeWidth="1.5" />
              <circle cx="24" cy="24" r="20" fill="none" stroke="var(--fg)" strokeWidth="1.5"
                strokeDasharray={String(125.66)} strokeDashoffset={String(125.66 * (1 - progress))}
                strokeLinecap="round"
                style={{ transform: "rotate(-90deg)", transformOrigin: "center",
                  transition: "stroke-dashoffset 0.6s cubic-bezier(.4,0,.2,1)" }} />
            </svg>
          </div>
          <div style={{ width: 120, height: 1, background: "var(--line)", borderRadius: 1, overflow: "hidden" }}>
            <div ref={barRef} style={{ width: "100%", height: "100%", background: "var(--fg)",
              transformOrigin: "left center", transform: "scaleX(0)" }} />
          </div>
        </div>
      );
    }

    /* ===================== APP ===================== */
    function App() {
      var route = useRoute();
      var stI = useState(false); var introDone = stI[0], setIntroDone = stI[1];

      useEffect(function() {
        if (route.page !== "works" || route.slug) setIntroDone(true);
      }, []);

      var handleNav = function(p) { navigate("/" + p); };

      useEffect(function() {
        if (route.page === "studio") document.title = "Studio - Studio Subtract";
        else if (route.page === "contact") document.title = "Contact - Studio Subtract";
        else document.title = "Studio Subtract";
      }, [route]);

      return (
        <>
          {!introDone && <IntroOverlay onDone={function() { setIntroDone(true); }} />}
          <Nav onNav={handleNav} page={route.page} />
          {route.page === "works" && <Gallery items={window.GALLERY_ITEMS} introDone={introDone} />}
          {route.page === "studio" && <StudioPage />}
          {route.page === "contact" && <ContactPage />}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

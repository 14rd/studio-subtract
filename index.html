    { id: "02", slug: "studio-james-jefferys", title: "Single Surface Interface", displayTitle: "Single Surface Interface", client: "Studio James Jefferys", year: "2026", role: "Creative Direction, Web Design", discipline: "Web", cover: "assets/covers/STUDIOJAMESJEFFERYS.png", blurb: "A single-surface website built as one digital skin. The premise: the most intuitive interface is the human body, so interaction is reduced to its essential elements and nothing more. The method is subtraction, used for clarity and control.", content: [] },

    { id: "10", slug: "piza", title: "PIZA", displayTitle: "PIZA", client: "Piza", year: "2025", role: "Creative Direction, Brand Identity", discipline: "Identity", cover: "assets/covers/PIZA.png", blurb: "A full brand identity built as one structure: strategy, typography, and visual system holding to a single idea. Nothing decorative survives. It reads as clarity and command from launch.", content: [{type:"img",src:"assets/projects/piza/1.jpg"},{type:"img",src:"assets/projects/piza/2.jpg"},{type:"img",src:"assets/projects/piza/3.jpg"}] }

  <script type="text/babel">

          content.style.transform = "translate3d(0, " + (-scrollCurrent.current) + "px, 0)";
          rafId.current = requestAnimationFrame(tick);
        };
        rafId.current = requestAnimationFrame(tick);

        return function() {
          cancelAnimationFrame(rafId.current);

      useEffect(function() {
        if (entering) return;

        var tick = function(t) {

            if (mag > 0) targetRef.current = Math.max(0, Math.min(n - 1, targetRef.current + sign * mag * mag * 3.0 * (dt / 1000)));
          }
          if (Math.abs(velocityRef.current) > 0.0001) {
            targetRef.current = Math.max(0, Math.min(n - 1, targetRef.current + velocityRef.current));
            velocityRef.current *= 0.94;
          }
          var delta = targetRef.current - progressRef.current;
          progressRef.current += Math.abs(delta) > 0.0005 ? delta * 0.09 : (progressRef.current = targetRef.current, 0);
          var progress = progressRef.current;

          if (!mobile && wrapperRef.current) {
            var mx2 = mouseRef.current.x, my2 = mouseRef.current.y;
            wrapperRef.current.style.transform = "translate3d(" + ((mx2-0.5)*28) + "px," + ((my2-0.5)*18) + "px,0) rotateX(" + (-(my2-0.5)*8) + "deg) rotateY(" + ((mx2-0.5)*12) + "deg)";
          }

          var activeIdx = hoverRef.current != null ? hoverRef.current : Math.max(0, Math.min(n-1, Math.round(progress)));
          for (var i = 0; i < n; i++) {

            var o = i - progress;
            el.style.transform = "translate3d(calc(-50% + " + (o*spreadX) + "px),calc(-50% + " + (((((i%n)+n)%n)*53)%130-65+o*6) + "px)," + (-Math.abs(o)*(mobile?150:220)) + "px) rotate(" + (Math.sin(i*1.3)*3.2) + "deg)";
            var absO = Math.abs(o);

        rafRef.current = requestAnimationFrame(tick);
        return function() { cancelAnimationFrame(rafRef.current); };
      }, [entering, n, mobile, spreadX, projects]);

      useEffect(function() {
        if (entering) return;
        var el = stageRef.current; if (!el) return;
        var onWheel = function(e) { e.preventDefault(); targetRef.current = Math.max(0, Math.min(n-1, targetRef.current + (e.deltaY+e.deltaX)*0.0025)); };
        el.addEventListener("wheel", onWheel, { passive: false });
        return function() { el.removeEventListener("wheel", onWheel); };
      }, [entering, n]);

      useEffect(function() {
        if (entering) return;
        var onKey = function(e) {
          if (e.key === "ArrowRight" || e.key === "ArrowDown") targetRef.current = Math.min(n-1, Math.round(targetRef.current)+1);
          else if (e.key === "ArrowLeft" || e.key === "ArrowUp") targetRef.current = Math.max(0, Math.round(targetRef.current)-1);
          else if (e.key === "Enter") onEnter(projects[Math.max(0, Math.min(n-1, Math.round(progressRef.current)))]);
        };
        window.addEventListener("keydown", onKey);
        return function() { window.removeEventListener("keydown", onKey); };
      }, [entering, onEnter, projects, n]);

      useEffect(function() {
        if (entering) return;
        var el = stageRef.current; if (!el) return;
        var startX = 0, startProg = 0, dragging = false, lastX = 0, lastT = 0;
        var onDown = function(e) { dragging = true; velocityRef.current = 0;
          var cx = e.clientX != null ? e.clientX : (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
          startX = cx; lastX = cx; lastT = performance.now(); startProg = targetRef.current; };
        var onMove = function(e) { if (!dragging) return;
          var cx = e.clientX != null ? e.clientX : (e.touches && e.touches[0] ? e.touches[0].clientX : 0);

        return function() { el.removeEventListener("mousedown", onDown); window.removeEventListener("mousemove", onMove); window.removeEventListener("mouseup", onUp);
          el.removeEventListener("touchstart", onDown); window.removeEventListener("touchmove", onMove); window.removeEventListener("touchend", onUp); };
      }, [entering, n]);

      useEffect(function() {
        var el = stageRef.current; if (!el) return;
        var onMove = function(e) { var r = el.getBoundingClientRect(); mouseRef.current = { x: (e.clientX-r.left)/r.width, y: (e.clientY-r.top)/r.height }; };

      var hasImgHero = project.content && project.content.length > 0 && project.content[0].type === "img";
      var heroSrc = hasImgHero ? project.content[0].src : project.cover;
      var contentItems = project.content ? (hasImgHero ? project.content.slice(1) : project.content) : [];

      return (
        <SmoothScroll scrollKey={project.id}>
          <div style={{ opacity: mounted ? 1 : 0, transition: "opacity 0.5s", animation: "slideIn 0.6s cubic-bezier(.2,.7,.2,1)" }}>
            <section style={{ position: "relative", width: "100%", overflow: "hidden",
              padding: mobile ? "80px 20px 40px" : "100px 32px 60px" }}>
              {heroSrc.endsWith(".mp4") ? (
                <video src={heroSrc} autoPlay muted loop playsInline style={{
                  width: "100%", maxWidth: 1200, display: "block", margin: "0 auto", objectFit: "contain",
                  transform: mounted ? "scale(1) translateZ(0)" : "scale(1.02) translateZ(0)",
                  transition: "transform 1.2s cubic-bezier(.2,.7,.2,1)", WebkitBackfaceVisibility: "hidden" }} />
              ) : (
                <img src={heroSrc} alt={project.title} style={{
                  width: "100%", maxWidth: 1200, display: "block", margin: "0 auto", objectFit: "contain",
                  transform: mounted ? "scale(1) translateZ(0)" : "scale(1.02) translateZ(0)",
                  transition: "transform 1.2s cubic-bezier(.2,.7,.2,1)", WebkitBackfaceVisibility: "hidden" }} />
              )}
            </section>

            <section style={{ maxWidth: 640, margin: "0 auto", padding: mobile ? "32px 20px" : "48px 32px", textAlign: "center" }}>
              <h1 style={{ fontWeight: 400, fontSize: mobile ? 14 : 16,
                lineHeight: 1.55, letterSpacing: "-0.01em", margin: "0 0 20px", color: "var(--fg)" }}>{project.displayTitle || project.title}</h1>
              <div style={{ fontSize: 11, fontWeight: 400, lineHeight: 1.6, letterSpacing: "-0.01em",
                color: "var(--fg-dim)", margin: "0 0 24px" }}>
                {project.client} — {project.year}<br/>{project.role}
              </div>
              <p style={{ fontWeight: 400, fontSize: mobile ? 13 : 14, lineHeight: 1.6, letterSpacing: "-0.01em",
                color: "var(--fg)", margin: 0 }}>{project.blurb}</p>
            </section>

            {contentItems.length > 0 && (
              <section style={{ padding: mobile ? "20px 20px 80px" : "40px 32px 120px", maxWidth: 1200, margin: "0 auto" }}>
                <div style={{ display: "flex", flexDirection: "column", gap: mobile ? 40 : 64 }}>
                  {contentItems.map(function(item, idx) {
                    if (item.type === "video") {
                      return (
                        <video key={idx} src={item.src} autoPlay muted loop playsInline style={{
                          width: "100%", display: "block", objectFit: "contain" }} />
                      );
                    }
                    return (
                      <img key={idx} src={item.src} alt={project.title + " " + (idx + 2)} loading="lazy" style={{
                        width: "100%", display: "block", objectFit: "contain" }} />
                    );
                  })}
                </div>
              </section>
            )}

            <section onClick={function() { onNext(next); }} style={{
              position: "relative", height: mobile ? "50vh" : "70vh", cursor: "pointer", overflow: "hidden",
              borderTop: "1px solid var(--line)" }}>
              <div style={{ position: "absolute", inset: 0, background: coverBg(next), filter: "brightness(0.85)" }}/>
              <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", textAlign: "center", color: "#fff" }}>
                <div>
                  <div style={{ fontSize: 11, fontWeight: 400, letterSpacing: "-0.01em", opacity: 0.85,
                    marginBottom: mobile ? 12 : 20, textShadow: "0 1px 12px rgba(0,0,0,0.3)" }}>Next</div>
                  <div style={{ fontWeight: 400, fontSize: mobile ? 14 : 16,
                    lineHeight: 1.55, letterSpacing: "-0.01em", textShadow: "0 2px 40px rgba(0,0,0,0.25)" }}>{next.displayTitle || next.title}</div>
                </div>
              </div>
            </section>
          </div>
        </SmoothScroll>
      );
    }

    /* ===================== NAV ===================== */
    function Nav({ onNav, page }) {
      var mobile = isMobile();
      return (
        <nav style={{ position: "fixed", top: 0, left: 0, right: 0, zIndex: 50,
          padding: mobile ? "20px 16px" : "24px 32px",
          display: "flex", alignItems: "center", justifyContent: "center",
          pointerEvents: "none",
          background: "linear-gradient(180deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0) 100%)",
          backdropFilter: "blur(15px)", WebkitBackdropFilter: "blur(15px)" }}>
          <div style={{ display: "flex", alignItems: "center", gap: mobile ? 16 : 24, pointerEvents: "auto",
            fontSize: mobile ? 11 : 12, fontWeight: 500, color: "var(--fg)", letterSpacing: "-0.01em" }}>
            <NavLink active={page === "works"} label="Works" onClick={function() { onNav("works"); }} />
            <NavLink active={page === "studio"} label="Studio" onClick={function() { onNav("studio"); }} />
            <NavLink active={page === "contact"} label="Contact" onClick={function() { onNav("contact"); }} />
          </div>
        </nav>
      );
    }

    function NavLink({ label, active, onClick }) {
      var st = useState(false); var hover = st[0], setHover = st[1];
      return (
        <a href={"/" + label.toLowerCase()} onClick={function(e) { e.preventDefault(); onClick && onClick(); }}
          onMouseEnter={function() { setHover(true); }} onMouseLeave={function() { setHover(false); }}
          style={{ color: active || hover ? "var(--fg)" : "var(--fg-dim)", textDecoration: active ? "underline" : "none",
            textUnderlineOffset: "4px", transition: "color 0.2s" }}>{label}</a>
      );
    }

    /* ===================== STUDIO PAGE ===================== */
    function StudioPage({ entering }) {
      var mobile = isMobile();
      return (
        <div style={{ position: "fixed", inset: 0, background: "var(--bg)", zIndex: 5,
          display: "flex", alignItems: "center", justifyContent: "center",
          animation: "slideIn 0.6s cubic-bezier(.2,.7,.2,1)",
          opacity: entering ? 0 : 1, transition: "opacity 0.5s" }}>
          <div style={{ maxWidth: 560, width: "100%", padding: mobile ? "0 20px" : "0 40px", textAlign: "center" }}>
            <p style={{ fontSize: mobile ? 14 : 16, fontWeight: 400, lineHeight: 1.55, letterSpacing: "-0.01em",
              color: "var(--fg)", margin: 0 }}>
              An artist-led studio working in subtraction. We remove everything that isn't essential. What remains is the work.
            </p>
            <p style={{ fontSize: mobile ? 14 : 16, fontWeight: 400, lineHeight: 1.55, letterSpacing: "-0.01em",
              color: "var(--fg-dim)", margin: "1.2em 0 0" }}>
              Founded by James Jefferys.
            </p>
          </div>
        </div>
      );
    }

    /* ===================== CONTACT PAGE ===================== */
    function ContactPage({ entering }) {
      var mobile = isMobile();
      return (
        <div style={{ position: "fixed", inset: 0, background: "var(--bg)", zIndex: 5,
          display: "flex", alignItems: "center", justifyContent: "center",
          animation: "slideIn 0.6s cubic-bezier(.2,.7,.2,1)",
          opacity: entering ? 0 : 1, transition: "opacity 0.5s" }}>
          <div style={{ maxWidth: 560, width: "100%", padding: mobile ? "0 20px" : "0 40px", textAlign: "center" }}>
            <a href="mailto:00@jamesjfrys.studio" style={{
              fontSize: mobile ? 14 : 16, fontWeight: 400, lineHeight: 1.55, letterSpacing: "-0.01em",
              color: "var(--fg)", textDecoration: "underline", textUnderlineOffset: "3px",
              textDecorationColor: "var(--line)", transition: "text-decoration-color 0.2s"
            }} onMouseEnter={function(e) { e.currentTarget.style.textDecorationColor = "var(--fg)"; }}
               onMouseLeave={function(e) { e.currentTarget.style.textDecorationColor = "var(--line)"; }}>00@jamesjfrys.studio</a>
          </div>
        </div>
      );
    }

    /* ===================== INTRO ===================== */
    function IntroOverlay({ onDone }) {
      var stH = useState(false); var hidden = stH[0], setHidden = stH[1];
      var stLoaded = useState(false); var loaded = stLoaded[0], setLoaded = stLoaded[1];

      useEffect(function() {
        var images = window.PROJECTS.map(function(p) { return p.cover; });
        var count = 0;
        images.forEach(function(src) {
          var img = new Image();
          img.onload = img.onerror = function() {
            count++;
            if (count >= images.length) setLoaded(true);
          };
          img.src = src;
        });
        var fallback = setTimeout(function() { setLoaded(true); }, 4000);
        return function() { clearTimeout(fallback); };
      }, []);

      useEffect(function() {
        if (!loaded) return;
        var t = setTimeout(function() { setHidden(true); onDone && onDone(); }, 300);
        return function() { clearTimeout(t); };
      }, [loaded]);

      return (
        <div style={{ position: "fixed", inset: 0, zIndex: 100, background: "var(--bg)",
          display: "grid", placeItems: "center",
          transition: "opacity 0.7s cubic-bezier(.2,.7,.2,1)",
          opacity: hidden ? 0 : 1,
          pointerEvents: hidden ? "none" : "auto" }}>
          <div style={{ width: 24, height: 24, position: "relative" }}>
            <div style={{ position: "absolute", inset: 0, borderRadius: "50%",
              border: "1.5px solid var(--fg)", borderTopColor: "transparent",
              animation: "loaderSpin 0.8s linear infinite" }} />
          </div>
        </div>
      );
    }

    /* ===================== APP ===================== */
    function App() {
      var route = useRoute();
      var stI = useState(false); var introDone = stI[0], setIntroDone = stI[1];
      var stCards = useState(false); var cardsReady = stCards[0], setCardsReady = stCards[1];
      var stTransition = useState(null); var transitioning = stTransition[0], setTransitioning = stTransition[1];

      useEffect(function() {
        if (route.page !== "works" || route.slug) setIntroDone(true);
      }, []);

      var handleIntroDone = function() {
        setIntroDone(true);
        requestAnimationFrame(function() { setCardsReady(true); });
      };

      var handleEnter = function(project) { navigate("/" + project.slug); };
      var handleBack = function() { navigate("/works"); };
      var handleNext = function(next) { navigate("/" + next.slug); };
      var handleNav = function(p) {
        if (p === "works" && (route.page === "studio" || route.page === "contact")) {
          setTransitioning("works");
          setTimeout(function() {
            navigate("/" + p);
            setCardsReady(false);
            requestAnimationFrame(function() {
              requestAnimationFrame(function() { setCardsReady(true); setTransitioning(null); });
            });
          }, 400);
        } else {
          navigate("/" + p);
        }
      };

      var activeProject = route.slug ? window.PROJECTS.find(function(p) { return p.slug === route.slug; }) : null;

      useEffect(function() {
        if (activeProject) document.title = activeProject.title + " - Studio Subtract";
        else if (route.page === "studio") document.title = "Studio - Studio Subtract";
        else if (route.page === "contact") document.title = "Contact - Studio Subtract";
        else document.title = "Studio Subtract";
      }, [route, activeProject]);

      useEffect(function() {
        if (introDone && route.page === "works" && !activeProject && !cardsReady) {
          setCardsReady(true);
        }
      }, [introDone, route.page, activeProject]);

      return (
        <>
          {!introDone && <IntroOverlay onDone={handleIntroDone} />}
          <Nav onNav={handleNav} page={route.page} />
          {route.page === "works" && !activeProject && <Gallery projects={window.PROJECTS} onEnter={handleEnter} cardsReady={cardsReady} />}
          {route.page === "studio" && <StudioPage entering={transitioning === "works"} />}
          {route.page === "contact" && <ContactPage entering={transitioning === "works"} />}
          {activeProject && (
            <ProjectDetail key={activeProject.id} project={activeProject} allProjects={window.PROJECTS}
              onBack={handleBack} onNext={handleNext} onNav={handleNav} />
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
